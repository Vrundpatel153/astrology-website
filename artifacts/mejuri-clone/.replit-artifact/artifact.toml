kind = "web"
previewPath = "/"
title = "Mejuri Clone"
version = "1.0.0"
id = "artifacts/mejuri-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19179

[services.development]
run = "pnpm --filter @workspace/mejuri-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mejuri-clone", "run", "build" ]
publicDir = "artifacts/mejuri-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19179"
BASE_PATH = "/"
